apiVersion: apps/v1
kind: Deployment
metadata:
  name: fit-file-compare
  labels:
    app: fit-file-compare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fit-file-compare
  template:
    metadata:
      labels:
        app: fit-file-compare
    spec:
      containers:
        - name: fit-file-compare
          image: ghcr.io/emilburzo/fit-file-compare:SHORT_SHA
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fit-file-compare
  labels:
    run: fit-file-compare
spec:
  ports:
    - port: 8080
      protocol: TCP
  selector:
    app: fit-file-compare
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fit-file-compare
spec:
  rules:
    - host: fit-file-compare.emilburzo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fit-file-compare
                port:
                  number: 8080
