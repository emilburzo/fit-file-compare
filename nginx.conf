server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The vendored JS libraries are the bulk of the payload (~500 KB -> ~150 KB).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;

    # Vendored libraries don't change for a given image -> cache hard.
    location /vendor/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # app.js is cache-busted via ?v=, so it's safe to cache for a while.
    location = /app.js {
        add_header Cache-Control "public, max-age=604800";
    }

    # Always revalidate the HTML entry point so new deploys show up immediately.
    location = / { add_header Cache-Control "no-cache"; }
    location = /index.html { add_header Cache-Control "no-cache"; }

    location / {
        try_files $uri $uri/ =404;
    }
}
